name: Build and Release Artifacts

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Select runner type'
        required: true
        default: 'codebuild'
        type: choice
        options:
          - codebuild
          - ubuntu-latest
      build_linux:
        description: 'Build for Linux'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build for macOS (Apple Silicon)'
        required: false
        default: true
        type: boolean
      build_windows:
        description: 'Build for Windows'
        required: false
        default: true
        type: boolean
      build_packed_installers:
        description: 'Whether to build a Balleirna, ICP, and Integrator packed installers'
        default: true
        required:  true
        type: boolean
      ballerina_extension_source:
        description: 'Choose whether to bundle Ballerina from GitHub VSIX or use marketplace flow'
        required: true
        default: 'github'
        type: choice
        options:
          - marketplace
          - github
      mi_extension_source:
        description: 'Choose whether to bundle MI from GitHub VSIX or use marketplace flow'
        required: true
        default: 'github'
        type: choice
        options:
          - marketplace
          - github
      delivery_mode:
        description: 'Select delivery mode: archive artifacts as workflow artifacts or publish as a GitHub Release'
        required: true
        default: 'archive'
        type: choice
        options:
          - archive
          - github-release

permissions:
  id-token: write
  contents: write     

env:
  awsRunnerId: codebuild-wso2_product-integrator-${{ github.run_id }}-${{ github.run_attempt }}  

jobs:
  resolve-versions:
    name: Resolve Component Versions
    runs-on: ubuntu-latest
    outputs:
      ballerina_version: ${{ steps.read-versions.outputs.ballerina_version }}
      ballerina_extension_version: ${{ steps.read-versions.outputs.ballerina_extension_version }}
      mi_extension_version: ${{ steps.read-versions.outputs.mi_extension_version }}
      icp_version: ${{ steps.read-versions.outputs.icp_version }}
      integrator_version: ${{ steps.read-versions.outputs.integrator_version }}
      ballerina_jre_version: ${{ steps.read-versions.outputs.ballerina_jre_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read versions file
        id: read-versions
        shell: bash
        run: |
          VERSIONS_FILE="ci/build/component-versions.properties"
          if [ ! -f "${VERSIONS_FILE}" ]; then
            echo "Error: ${VERSIONS_FILE} does not exist." >&2
            exit 1
          fi

          read_property() {
            local key="$1"
            awk -F= -v property_key="$key" '$1 == property_key { print substr($0, index($0, "=") + 1); exit }' "${VERSIONS_FILE}" | tr -d '\r'
          }

          BALLERINA_VERSION=$(read_property "ballerina.version")
          BALLERINA_EXTENSION_VERSION=$(read_property "ballerina.extension.version")
          MI_EXTENSION_VERSION=$(read_property "wso2.micro-integrator.extension.version")
          ICP_VERSION=$(read_property "icp.version")
          INTEGRATOR_VERSION=$(read_property "integrator.version")
          BALLERINA_JRE_VERSION=$(read_property "ballerina.jre.version")

          if [ -z "${BALLERINA_VERSION}" ] || [ -z "${ICP_VERSION}" ] || [ -z "${INTEGRATOR_VERSION}" ] || [ -z "${BALLERINA_JRE_VERSION}" ]; then
            echo "Error: ballerina.version, icp.version, integrator.version, and ballerina.jre.version must be set in ${VERSIONS_FILE}." >&2
            exit 1
          fi

          if [[ -n "${BALLERINA_EXTENSION_VERSION}" && "${BALLERINA_EXTENSION_VERSION}" =~ ^[vV] ]]; then
            echo "Error: ballerina.extension.version must not start with 'v'." >&2
            exit 1
          fi

          if [[ -n "${MI_EXTENSION_VERSION}" && "${MI_EXTENSION_VERSION}" =~ ^[vV] ]]; then
            echo "Error: wso2.micro-integrator.extension.version must not start with 'v'." >&2
            exit 1
          fi

          echo "ballerina_version=${BALLERINA_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ballerina_extension_version=${BALLERINA_EXTENSION_VERSION}" >> "$GITHUB_OUTPUT"
          echo "mi_extension_version=${MI_EXTENSION_VERSION}" >> "$GITHUB_OUTPUT"
          echo "icp_version=${ICP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "integrator_version=${INTEGRATOR_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ballerina_jre_version=${BALLERINA_JRE_VERSION}" >> "$GITHUB_OUTPUT"

  compile:
    needs: resolve-versions
    uses: ./.github/workflows/compile.yml
    secrets: inherit  
    with:
      runOnAWS: ${{ github.event.inputs.runner == 'codebuild' }}
      ballerina_extension_source: ${{ github.event.inputs.ballerina_extension_source }}
      mi_extension_source: ${{ github.event.inputs.mi_extension_source }}
      build_packed_installers: ${{ github.event.inputs.build_packed_installers == 'true' }}

  smoke-test:
    if: ${{ github.event.inputs.build_packed_installers == 'true' }}
    needs: compile
    uses: ./.github/workflows/smoke-test.yml
    with:
      artifact_name: Product-Integrator-TAR

  smoke-test-windows:
    if: ${{ github.event.inputs.build_windows == 'true' && github.event.inputs.build_packed_installers == 'true' }}
    needs: build-windows
    uses: ./.github/workflows/smoke-test.yml
    with:
      windows_artifact_name: Product-Integrator-Windows

  build-macos:
    if: ${{ github.event.inputs.build_macos == 'true' }}
    name: Build (macOS)
    runs-on: macos-latest
    needs: [resolve-versions, compile]
    defaults:
      run:
        working-directory: lib/vscode
    strategy:
      matrix:
        arch: [arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: lib/vscode/.nvmrc
          cache: npm
          cache-dependency-path: lib/vscode/package-lock.json

      - name: Cache Rust toolchain (macOS)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-toolchain-macos-${{ matrix.arch }}-${{ hashFiles('lib/vscode/cli/Cargo.lock') }}
          restore-keys: |
            cargo-toolchain-macos-${{ matrix.arch }}-
            cargo-toolchain-macos-

      - name: Cache CLI compilation (macOS)
        id: cache-cli-macos
        uses: actions/cache@v4
        with:
          path: |
            lib/vscode/cli/target/
          key: cli-macos-${{ matrix.arch }}-${{ hashFiles('patches/*.diff', 'lib/vscode/cli/Cargo.lock', 'lib/vscode/cli/src/**/*.rs', 'lib/vscode/cli/Cargo.toml') }}
          restore-keys: |
            cli-macos-${{ matrix.arch }}-

      - name: Cache native modules (macOS)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            lib/vscode/.build/node_modules_cache
          key: native-modules-macos-${{ matrix.arch }}-${{ hashFiles('lib/vscode/package-lock.json', 'patches/*.diff') }}
          restore-keys: |
            native-modules-macos-${{ matrix.arch }}-
            native-modules-macos-

      - name: Cache built-in extensions
        id: cache-extensions-macos
        uses: actions/cache@v4
        with:
          path: |
            lib/vscode/.build/builtInExtensions
            lib/vscode/.build/extensions
          key: extensions-shared-${{ inputs.ballerina_extension_source }}-${{ needs.resolve-versions.outputs.ballerina_extension_version }}-${{ inputs.mi_extension_source }}-${{ needs.resolve-versions.outputs.mi_extension_version }}-${{ hashFiles('patches/*.diff', 'ci/build/update-product.sh', 'ci/build/component-versions.properties', 'lib/vscode/package.json', 'wi/**') }}

      - name: Download compilation artifact
        uses: actions/download-artifact@v4
        with:
          name: compilation
          path: lib/vscode

      - name: Extract compilation output
        run: tar -xzf compilation.tar.gz

      - name: Download WI extension VSIX
        uses: actions/download-artifact@v4
        with:
          name: wi-extension-vsix
          path: wi/wi-extension

      - name: Install quilt (macOS)
        run: |
          brew install quilt

      - name: Apply patches (macOS)
        run: quilt push -a

      - name: Set Ballerina extension version
        if: ${{ needs.resolve-versions.outputs.ballerina_extension_version != '' }}
        shell: bash
        working-directory: .
        run: |
          echo "BALLERINA_EXTENSION_VERSION=${{ needs.resolve-versions.outputs.ballerina_extension_version }}" >> "$GITHUB_ENV"

      - name: Download archived Ballerina VSIX
        if: ${{ github.event.inputs.ballerina_extension_source == 'github' && needs.resolve-versions.outputs.ballerina_extension_version != '' }}
        shell: bash
        working-directory: .
        run: |
          chmod +x ./ci/download-vsix.sh
          BALLERINA_VSIX_PATH=$(./ci/download-vsix.sh "wso2/ballerina-vscode" "v${{ needs.resolve-versions.outputs.ballerina_extension_version }}" "ballerina-${{ needs.resolve-versions.outputs.ballerina_extension_version }}.vsix" "$PWD")
          echo "BALLERINA_VSIX_PATH=${BALLERINA_VSIX_PATH}" >> "$GITHUB_ENV"

      - name: Download archived MI VSIX
        if: ${{ github.event.inputs.mi_extension_source == 'github' && needs.resolve-versions.outputs.mi_extension_version != '' }}
        shell: bash
        working-directory: .
        run: |
          chmod +x ./ci/download-vsix.sh
          MI_VSIX_PATH=$(./ci/download-vsix.sh "wso2/mi-vscode" "v${{ needs.resolve-versions.outputs.mi_extension_version }}" "micro-integrator-${{ needs.resolve-versions.outputs.mi_extension_version }}.vsix" "$PWD")
          echo "MI_VSIX_PATH=${MI_VSIX_PATH}" >> "$GITHUB_ENV"

      - name: Update product.json and branding
        working-directory: .
        run: |
          chmod +x ./ci/build/update-product.sh
          ./ci/build/update-product.sh "${{ needs.resolve-versions.outputs.integrator_version }}"

      - name: Validate Xcode tools (macOS)
        run: |
          xcode-select -p
          python3 -m pip install --user setuptools || true

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          # Add ARM64 target for cross-compilation
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            rustup target add aarch64-apple-darwin
          else
            rustup target add x86_64-apple-darwin
          fi

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci

      - name: Mixin distro modules
        run: |
          node build/azure-pipelines/distro/mixin-npm.ts || true
          node build/azure-pipelines/distro/mixin-quality.ts || true

      - name: Install builtin extensions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.cache-extensions-macos.outputs.cache-hit }}" = "true" ]; then
            echo "✅ Extensions cache hit - using shared cached extensions"
          else
            echo "⬇️ Downloading built-in extensions"
            npm run download-builtin-extensions
          fi

      - name: Build client (macOS ${{ matrix.arch }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run gulp vscode-darwin-${{ matrix.arch }}-min-ci

      - name: Build CLI (macOS ${{ matrix.arch }})
        run: |
          source "$HOME/.cargo/env"
          cd cli
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            TARGET_DIR="./target/aarch64-apple-darwin/release"
            TARGET_TRIPLE="aarch64-apple-darwin"
          else
            TARGET_DIR="./target/x86_64-apple-darwin/release"
            TARGET_TRIPLE="x86_64-apple-darwin"
          fi
          
          if [ "${{ steps.cache-cli-macos.outputs.cache-hit }}" = "true" ]; then
            echo "✅ CLI cache hit - checking for cached CLI binary"
            if [ -f "$TARGET_DIR/code" ]; then
              echo "Cached CLI binary found and ready to use"
            else
              echo "⚠️ Cache hit but binary missing - rebuilding"
              cargo build --release --bin=code --target=$TARGET_TRIPLE
            fi
          else
            echo "❌ CLI cache miss - compiling CLI"
            cargo build --release --bin=code --target=$TARGET_TRIPLE
          fi
          
          # Set CLI_BIN path relative to parent directory (after cd ..)
          CLI_BIN="./cli/$TARGET_DIR/code"
          cd ..

          # Verify CLI binary was built
          if [ ! -f "$CLI_BIN" ]; then
            echo "CLI binary not found at $CLI_BIN" >&2
            find ./cli/target -type f -name code 2>/dev/null || true
            exit 1
          fi
          
          # Get CLI app name from the source product.json
          CLI_APP_NAME=$(node -p "require('./product.json').tunnelApplicationName")
          
          # Find the .app directory inside VSCode-darwin-arm64
          APP_DIR=$(find "../VSCode-darwin-${{ matrix.arch }}" -name "*.app" -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "Error: Could not find .app directory in VSCode-darwin-${{ matrix.arch }}" >&2
            ls -la "../VSCode-darwin-${{ matrix.arch }}/"
            exit 1
          fi
          
          # Copy CLI to build output
          mkdir -p "$APP_DIR/Contents/Resources/app/bin"
          cp "$CLI_BIN" "$APP_DIR/Contents/Resources/app/bin/$CLI_APP_NAME"
          chmod +x "$APP_DIR/Contents/Resources/app/bin/$CLI_APP_NAME"

      - name: Re-package with CLI (macOS ${{ matrix.arch }})
        run: |
          # Re-create the zip with the CLI included
          mkdir -p ../artifacts
          (cd .. && zip -qry "artifacts/VSCode-darwin-${{ matrix.arch }}.zip" VSCode-darwin-${{ matrix.arch }})

      - name: Sign macOS application
        run: |
          # Find the app directory
          APP_DIR=$(find "../VSCode-darwin-${{ matrix.arch }}" -name "*.app" -type d | head -1)
          
          if [ -n "$APP_DIR" ]; then
            echo "Signing application: $APP_DIR"
            
            # Ad-hoc signing (for local development/testing)
            codesign --force --deep --sign - "$APP_DIR"
            
            # Verify the signature
            codesign --verify --verbose "$APP_DIR"
            
            echo "Application signed successfully"
          else
            echo "No .app directory found to sign"
          fi

      - name: Upload macOS artifacts
        if: ${{ github.event.inputs.build_packed_installers == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-darwin-${{ matrix.arch }}
          path: |
            lib/artifacts/*
          if-no-files-found: error
      
      - name: Zip the artifacts and copy artifacts
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        run: |
          APP_DIR=$(find "../VSCode-darwin-${{ matrix.arch }}" -name "*.app" -type d | head -1)
          mkdir -p ../artifacts
          (cd .. && zip -qry "artifacts/VSCode-darwin-${{ matrix.arch }}.zip" VSCode-darwin-${{ matrix.arch }})
          cp ../artifacts/VSCode-darwin-${{ matrix.arch }}.zip ../../installers/mac/
      - name: Build macOS installer packages
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        run: |
          cd ../..
          ROOT_DIR=$(pwd)
          echo "Root dir: ${ROOT_DIR}"
          BALLERINA_VERSION="${{ needs.resolve-versions.outputs.ballerina_version }}"
          BALLERINA_VERSION_FILENAME="${BALLERINA_VERSION%-*}"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
          BALLERINA_ARCH="macos-arm"
          JRE_PLATFORM="macos-arm-64"
          else
          BALLERINA_ARCH="macos"
          JRE_PLATFORM="macos-64"
          fi
          BALLERINA_URL="https://github.com/ballerina-platform/ballerina-distribution/releases/download/v${BALLERINA_VERSION}/ballerina-${BALLERINA_VERSION_FILENAME}-swan-lake-${BALLERINA_ARCH}.zip"
          ICP_VERSION="${{ needs.resolve-versions.outputs.icp_version }}"
          ICP_VERSION_FILENAME="${ICP_VERSION%-*}"
          if [ "$ICP_VERSION" != "$ICP_VERSION_FILENAME" ]; then
            ICP_VERSION_FILENAME="${ICP_VERSION_FILENAME}-SNAPSHOT"
          fi
          ICP_URL="https://github.com/wso2/integration-control-plane/releases/download/v${ICP_VERSION}/wso2-integration-control-plane-${ICP_VERSION}.zip"
          JRE_VERSION="${{ needs.resolve-versions.outputs.ballerina_jre_version }}"
          JRE_URL="https://github.com/ballerina-platform/ballerina-custom-jre/releases/download/${JRE_VERSION}/ballerina-jre-${JRE_PLATFORM}-${JRE_VERSION}.zip"
          INTEGRATOR_VERSION="${{ needs.resolve-versions.outputs.integrator_version }}"
          cd ./installers/mac
          wget -O ballerina.zip "$BALLERINA_URL"
          wget -O icp.zip "$ICP_URL"
          wget -O jre.zip "$JRE_URL"
          ./build.sh ballerina.zip $BALLERINA_VERSION VSCode-darwin-${{ matrix.arch }}.zip icp.zip jre.zip $INTEGRATOR_VERSION ${{ matrix.arch }}
          cd ${ROOT_DIR}

      - name: Login to AWS
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Upload macOS artifacts to S3
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        working-directory: .
        run: |
          S3_PATH="s3://${{ secrets.AWS_S3_BUCKET }}/wi/${{ github.run_id }}/"
          aws s3 cp installers/mac/ "${S3_PATH}" --recursive --exclude "*" --include "*.dmg"
      
      - name: Upload macOS DMG artifacts
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Product-Integrator-Darwin-DMG-${{ matrix.arch }}
          path: |
            installers/mac/*.dmg
          if-no-files-found: error

      - name: cosign-installer
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        uses: sigstore/cosign-installer@v3.5.0
      - name: Sign the dmg installer
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        run: |
          cd ../..
          cosign sign-blob installers/mac/wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}-${{ matrix.arch }}.dmg --output-certificate installers/mac/wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}-${{ matrix.arch }}.dmg.pem --output-signature installers/mac/wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}-${{ matrix.arch }}.dmg.sig --yes

      - name: Verify signature of the dmg installer
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        run: |
          cd ../..
          cosign verify-blob installers/mac/wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}-${{ matrix.arch }}.dmg --certificate installers/mac/wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}-${{ matrix.arch }}.dmg.pem --signature installers/mac/wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}-${{ matrix.arch }}.dmg.sig --certificate-identity=https://github.com/wso2/product-integrator/.github/workflows/build-and-release.yml@${{ github.ref }} --certificate-oidc-issuer=https://token.actions.githubusercontent.com

      - name: Generate Hashes for dmg installer
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        run: |
          cd ../..
          openssl dgst -sha256 -out installers/mac/wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}-${{ matrix.arch }}.dmg.sha256 installers/mac/wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}-${{ matrix.arch }}.dmg

      - name: Upload Signatures and Hashes for mac installers
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Signatures-and-Hashes-MAC
          path: |
            installers/mac/*.pem
            installers/mac/*.sig
            installers/mac/*.sha256
          if-no-files-found: error

  build-windows:
    if: ${{ github.event.inputs.build_windows == 'true' }}
    name: Build (Windows)
    runs-on: windows-latest
    needs: [resolve-versions, compile]
    defaults:
      run:
        working-directory: lib/vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: lib/vscode/.nvmrc
          cache: npm
          cache-dependency-path: lib/vscode/package-lock.json

      - name: Cache native modules (Windows)
        uses: actions/cache@v4
        with:
          path: |
            lib/vscode/node_modules
            lib/vscode/.build/node_modules_cache
          key: native-modules-windows-${{ hashFiles('lib/vscode/package-lock.json') }}
          restore-keys: |
            native-modules-windows-

      - name: Cache Rust toolchain (Windows)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-toolchain-windows-${{ hashFiles('lib/vscode/cli/Cargo.lock') }}
          restore-keys: |
            cargo-toolchain-windows-

      - name: Cache CLI compilation (Windows)
        id: cache-cli-windows
        uses: actions/cache@v4
        with:
          path: |
            lib/vscode/cli/target/
          key: cli-windows-${{ hashFiles('patches/*.diff', 'lib/vscode/cli/Cargo.lock', 'lib/vscode/cli/src/**/*.rs', 'lib/vscode/cli/Cargo.toml') }}
          restore-keys: |
            cli-windows-

      - name: Cache built-in extensions
        id: cache-extensions-windows
        uses: actions/cache@v4
        with:
          path: |
            lib/vscode/.build/builtInExtensions
            lib/vscode/.build/extensions
          key: extensions-shared-${{ inputs.ballerina_extension_source }}-${{ needs.resolve-versions.outputs.ballerina_extension_version }}-${{ inputs.mi_extension_source }}-${{ needs.resolve-versions.outputs.mi_extension_version }}-${{ hashFiles('patches/*.diff', 'ci/build/update-product.sh', 'ci/build/component-versions.properties', 'lib/vscode/package.json', 'wi/**') }}

      - name: Download compilation artifact
        uses: actions/download-artifact@v4
        with:
          name: compilation
          path: lib/vscode

      - name: Extract compilation output
        shell: pwsh
        run: tar -xzf compilation.tar.gz

      - name: Download WI extension VSIX
        uses: actions/download-artifact@v4
        with:
          name: wi-extension-vsix
          path: wi/wi-extension

      - name: Install Rsync (Windows)
        shell: pwsh
        run: |
          choco install -y rsync  

      - name: Apply patches (Windows)
        shell: bash
        working-directory: .
        run: |
          # Apply patches using git apply with lenient options
          while IFS= read -r patch || [ -n "$patch" ]; do
            # Trim whitespace from patch filename
            patch=$(echo "$patch" | xargs)
            # Skip empty lines and comments
            [[ -z "$patch" || "$patch" =~ ^[[:space:]]*# ]] && continue
            echo "Applying patch: $patch"
            git apply --whitespace=fix --ignore-whitespace "patches/$patch" || \
            git apply --reject --whitespace=fix "patches/$patch" || \
            (echo "Warning: Failed to apply patch $patch" && exit 1)
          done < patches/series

      - name: Set Ballerina extension version
        if: ${{ needs.resolve-versions.outputs.ballerina_extension_version != '' }}
        shell: bash
        working-directory: .
        run: |
          echo "BALLERINA_EXTENSION_VERSION=${{ needs.resolve-versions.outputs.ballerina_extension_version }}" >> "$GITHUB_ENV"

      - name: Download archived Ballerina VSIX
        if: ${{ github.event.inputs.ballerina_extension_source == 'github' && needs.resolve-versions.outputs.ballerina_extension_version != '' }}
        shell: bash
        working-directory: .
        run: |
          chmod +x ./ci/download-vsix.sh
          BALLERINA_VSIX_PATH=$(./ci/download-vsix.sh "wso2/ballerina-vscode" "v${{ needs.resolve-versions.outputs.ballerina_extension_version }}" "ballerina-${{ needs.resolve-versions.outputs.ballerina_extension_version }}.vsix" "$PWD")
          echo "BALLERINA_VSIX_PATH=${BALLERINA_VSIX_PATH}" >> "$GITHUB_ENV"

      - name: Download archived MI VSIX
        if: ${{ github.event.inputs.mi_extension_source == 'github' && needs.resolve-versions.outputs.mi_extension_version != '' }}
        shell: bash
        working-directory: .
        run: |
          chmod +x ./ci/download-vsix.sh
          MI_VSIX_PATH=$(./ci/download-vsix.sh "wso2/mi-vscode" "v${{ needs.resolve-versions.outputs.mi_extension_version }}" "micro-integrator-${{ needs.resolve-versions.outputs.mi_extension_version }}.vsix" "$PWD")
          echo "MI_VSIX_PATH=${MI_VSIX_PATH}" >> "$GITHUB_ENV"

      - name: Update product.json and branding
        shell: bash
        working-directory: .
        run: |
          chmod +x ./ci/build/update-product.sh
          ./ci/build/update-product.sh "${{ needs.resolve-versions.outputs.integrator_version }}"

      - name: Install Rust toolchain (Windows)
        shell: pwsh
        run: |
          # Download and install Rust
          Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "rustup-init.exe"
          ./rustup-init.exe -y --default-toolchain stable
          # Add Rust to PATH for this session
          $env:PATH += ";$env:USERPROFILE\.cargo\bin"

      - name: Install OpenSSL (Windows)
        shell: pwsh
        run: |
          # Install vcpkg if not already present, otherwise update it
          if (Test-Path "C:\vcpkg\.git") {
            Write-Host "vcpkg already cloned, fetching latest..."
            cd C:\vcpkg
            git fetch origin
            git pull origin master
          } else {
            Write-Host "Cloning vcpkg..."
            git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
            cd C:\vcpkg
          }
          # Bootstrap vcpkg (idempotent)
          if (-not (Test-Path "C:\vcpkg\vcpkg.exe")) {
            .\bootstrap-vcpkg.bat
          }
          # Install OpenSSL (vcpkg skips if already installed)
          .\vcpkg.exe install openssl:x64-windows-static
          # Set environment variables for OpenSSL
          $env:VCPKG_ROOT = "C:\vcpkg"
          $env:OPENSSL_DIR = "C:\vcpkg\installed\x64-windows-static"
          # Make environment variables persistent for subsequent steps
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\vcpkg\installed\x64-windows-static\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\vcpkg\installed\x64-windows-static\include" >> $env:GITHUB_ENV

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci

      - name: Mixin distro modules
        run: |
          node build/azure-pipelines/distro/mixin-npm.ts || true
          node build/azure-pipelines/distro/mixin-quality.ts || true

      - name: Install builtin extensions
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.cache-extensions-windows.outputs.cache-hit }}" = "true" ]; then
            echo "✅ Extensions cache hit - using shared cached extensions"
          else
            echo "⬇️ Downloading built-in extensions"
            npm run download-builtin-extensions
          fi

      - name: Download exlporer Dll
        shell: pwsh
        run: node build/win32/explorer-dll-fetcher.ts .build/win32/appx

      - name: Build client (Windows)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run gulp "vscode-win32-x64-min-ci"

      - name: Build CLI (Windows)
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
          OPENSSL_DIR: C:\vcpkg\installed\x64-windows-static
          OPENSSL_LIB_DIR: C:\vcpkg\installed\x64-windows-static\lib
          OPENSSL_INCLUDE_DIR: C:\vcpkg\installed\x64-windows-static\include
          OPENSSL_STATIC: 1
        run: |
          # Add Rust to PATH
          $env:PATH += ";$env:USERPROFILE\.cargo\bin"
          cd cli
          
          if ("${{ steps.cache-cli-windows.outputs.cache-hit }}" -eq "true") {
            Write-Host "✅ CLI cache hit - checking for cached CLI binary"
            if (Test-Path "./target/release/code.exe") {
              Write-Host "Cached CLI binary found and ready to use"
            } else {
              Write-Host "⚠️ Cache hit but binary missing - rebuilding"
              cargo build --release --bin=code
            }
          } else {
            Write-Host "❌ CLI cache miss - compiling CLI"
            cargo build --release --bin=code
          }
          
          # Verify CLI binary was built
          if (-not (Test-Path "./target/release/code.exe")) {
            Write-Host "CLI binary not found at ./target/release/code.exe" -ForegroundColor Red
            Get-ChildItem -Path ./target -Recurse -Name "code.exe" -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Mix in built CLI into client (Windows)
        shell: pwsh
        run: |
          cd cli
          $cliBin = "./target/release/code.exe"
          
          # Get CLI app name from source product.json (not from app bundle)
          $productJson = Get-Content "../product.json" | ConvertFrom-Json
          $cliAppName = $productJson.tunnelApplicationName + ".exe"
          
          # Create bin directory and copy CLI
          $binDir = "../VSCode-win32-x64/bin"
          New-Item -ItemType Directory -Path $binDir -Force
          Copy-Item $cliBin "$binDir/$cliAppName"

      - name: Re-package with CLI (Windows)
        shell: pwsh
        run: |
          # Re-create the zip with the CLI included
          mkdir -p ../artifacts
          $archivePath = "../artifacts/VSCode-win32-x64.zip"
          Remove-Item $archivePath -ErrorAction SilentlyContinue
          Compress-Archive -Path ../VSCode-win32-x64/* -DestinationPath $archivePath -Force

      - name: Upload Windows artifacts
        if: ${{ github.event.inputs.build_packed_installers == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-win32
          path: |
            lib/artifacts/*
          if-no-files-found: error
      
      - name: Copy Integrator artifact to build directory
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        run: |
          cp ../artifacts/VSCode-win32-x64.zip ../../installers/windows/
      - name: Exclude build workspace from Windows Defender
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        continue-on-error: true
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE\installers\windows"
      - name: Enable long paths (Windows)
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        continue-on-error: true
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1
      - name: Build Windows installer packages
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        shell: pwsh
        run: |
          cd ..\..
          $ROOT_DIR = Get-Location
          Write-Host "Root dir: $ROOT_DIR"
          $BALLERINA_VERSION = "${{ needs.resolve-versions.outputs.ballerina_version }}"
          $BALLERINA_VERSION_FILENAME = $BALLERINA_VERSION -replace '-.*$', ''
          $BALLERINA_URL = "https://github.com/ballerina-platform/ballerina-distribution/releases/download/v${BALLERINA_VERSION}/ballerina-${BALLERINA_VERSION_FILENAME}-swan-lake-windows.zip"
          $ICP_VERSION = "${{ needs.resolve-versions.outputs.icp_version }}"
          $ICP_VERSION_FILENAME = $ICP_VERSION -replace '-.*$', ''
          if ($ICP_VERSION -ne $ICP_VERSION_FILENAME) {
            $ICP_VERSION_FILENAME = "${ICP_VERSION_FILENAME}-SNAPSHOT"
          }
          $ICP_URL = "https://github.com/wso2/integration-control-plane/releases/download/v${ICP_VERSION}/wso2-integration-control-plane-${ICP_VERSION}.zip"
          $JRE_VERSION = "${{ needs.resolve-versions.outputs.ballerina_jre_version }}"
          $JRE_URL = "https://github.com/ballerina-platform/ballerina-custom-jre/releases/download/${JRE_VERSION}/ballerina-jre-win-64-${JRE_VERSION}.zip"
          $INTEGRATOR_VERSION = "${{ needs.resolve-versions.outputs.integrator_version }}"
          cd .\installers\windows
          Invoke-WebRequest -Uri $BALLERINA_URL -OutFile "ballerina.zip"
          Invoke-WebRequest -Uri $ICP_URL -OutFile "icp.zip"
          Invoke-WebRequest -Uri $JRE_URL -OutFile "jre.zip"
          .\build.bat .\ballerina.zip $BALLERINA_VERSION .\VSCode-win32-x64.zip .\icp.zip .\jre.zip $INTEGRATOR_VERSION

      - name: Login to AWS
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload Windows artifacts to S3
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        shell: bash
        working-directory: .
        run: |
          S3_PATH="s3://${{ secrets.AWS_S3_BUCKET }}/wi/${{ github.run_id }}/"
          aws s3 cp installers/windows/WixPackage/bin/x64/Release/en-US/ "${S3_PATH}" --recursive --exclude "*" --include "*.msi"

      - name: Upload Windows artifacts
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Product-Integrator-Windows
          path: |
            installers\windows\WixPackage\bin\x64\Release\en-US\*.msi
          if-no-files-found: error
      
      - name: cosign-installer
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        uses: sigstore/cosign-installer@v3.5.0
      - name: Sign the msi installer
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        run: |
          cd ../..
          cosign sign-blob installers\windows\WixPackage\bin\x64\Release\en-US\wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}.msi --output-certificate installers\windows\wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}.msi.pem --output-signature installers\windows\wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}.msi.sig --yes
      - name: Verify signature of the msi installer
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        run: |
          cd ../..
          cosign verify-blob installers\windows\WixPackage\bin\x64\Release\en-US\wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}.msi --certificate installers\windows\wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}.msi.pem --signature installers\windows\wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}.msi.sig --certificate-identity=https://github.com/wso2/product-integrator/.github/workflows/build-and-release.yml@${{ github.ref }} --certificate-oidc-issuer=https://token.actions.githubusercontent.com

          
      - name: Generate Hashes for msi installer
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        run: |
          cd ../..
          openssl dgst -sha256 -out installers\windows\wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}.msi.sha256 installers\windows\WixPackage\bin\x64\Release\en-US\wso2-integrator-${{ needs.resolve-versions.outputs.integrator_version }}.msi 

      - name: Upload Signatures and Hashes for msi installer
        if: ${{ github.event.inputs.build_packed_installers == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Signatures-and-Hashes-MSI
          path: |
            installers\windows\*.pem
            installers\windows\*.sig
            installers\windows\*.sha256
          if-no-files-found: error

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [resolve-versions, compile, build-macos, build-windows, smoke-test, smoke-test-windows]
    if: always() && (needs.compile.result == 'success') && (needs.smoke-test.result == 'success' || needs.smoke-test.result == 'skipped') && (needs.smoke-test-windows.result == 'success' || needs.smoke-test-windows.result == 'skipped') && (github.event.inputs.build_packed_installers == 'false') && (github.event.inputs.delivery_mode == 'archive')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Create unified release artifact
        run: |
          mkdir -p release-artifacts
          
          # Copy Linux artifacts if available
          if [ -d "all-artifacts/artifacts-linux" ]; then
            cp all-artifacts/artifacts-linux/* release-artifacts/ || true
          fi
          
          # Copy macOS artifacts if available
          if [ -d "all-artifacts/artifacts-darwin-x64" ]; then
            cp all-artifacts/artifacts-darwin-x64/* release-artifacts/ || true
          fi
          if [ -d "all-artifacts/artifacts-darwin-arm64" ]; then
            cp all-artifacts/artifacts-darwin-arm64/* release-artifacts/ || true
          fi
          
          # Copy Windows artifacts if available
          if [ -d "all-artifacts/artifacts-win32" ]; then
            cp all-artifacts/artifacts-win32/* release-artifacts/ || true
          fi
          
          # List all created artifacts
          echo "Created release artifacts:"
          ls -la release-artifacts/

      - name: Upload unified release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wso2-integrator-release
          path: release-artifacts/*
          if-no-files-found: warn

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-versions, compile, build-macos, build-windows, smoke-test, smoke-test-windows]
    if: |
      always() &&
      (needs.compile.result == 'success') &&
      (needs.smoke-test.result == 'success') &&
      (needs.smoke-test-windows.result == 'success' || needs.smoke-test-windows.result == 'skipped') &&
      (github.event.inputs.delivery_mode == 'github-release') &&
      (github.event.inputs.build_packed_installers == 'true')
    steps:
      - name: Download Linux DEB artifacts
        uses: actions/download-artifact@v4
        with:
          name: Product-Integrator-DEB
          path: release-files/
        continue-on-error: true

      - name: Download Signatures and Hashes (DEB)
        uses: actions/download-artifact@v4
        with:
          name: Signatures-and-Hashes-DEB
          path: release-files/
        continue-on-error: true

      - name: Download Linux RPM artifacts
        uses: actions/download-artifact@v4
        with:
          name: Product-Integrator-RPM
          path: release-files/
        continue-on-error: true

      - name: Download Signatures and Hashes (RPM)
        uses: actions/download-artifact@v4
        with:
          name: Signatures-and-Hashes-RPM
          path: release-files/
        continue-on-error: true

      - name: Download Linux TAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: Product-Integrator-TAR
          path: release-files/
        continue-on-error: true

      - name: Download macOS DMG artifacts
        uses: actions/download-artifact@v4
        with:
          name: Product-Integrator-Darwin-DMG-arm64
          path: release-files/
        continue-on-error: true

      - name: Download Signatures and Hashes (MAC)
        uses: actions/download-artifact@v4
        with:
          name: Signatures-and-Hashes-MAC
          path: release-files/
        continue-on-error: true

      - name: Download Windows MSI artifacts
        uses: actions/download-artifact@v4
        with:
          name: Product-Integrator-Windows
          path: release-files/
        continue-on-error: true

      - name: Download Signatures and Hashes (MSI)
        uses: actions/download-artifact@v4
        with:
          name: Signatures-and-Hashes-MSI
          path: release-files/
        continue-on-error: true

      - name: List release files
        run: |
          echo "Files to be released under tag v${{ needs.resolve-versions.outputs.integrator_version }}:"
          ls -la release-files/ || echo "No release files found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-versions.outputs.integrator_version }}
          name: WSO2 Integrator v${{ needs.resolve-versions.outputs.integrator_version }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-version:
    name: Bump Integrator Version
    runs-on: ubuntu-latest
    needs: [publish-github-release, resolve-versions]
    if: needs.publish-github-release.result == 'success'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment alpha version
        id: bump
        run: |
          VERSIONS_FILE="ci/build/component-versions.properties"
          CURRENT_VERSION=$(awk -F= '$1 == "integrator.version" { print $2; exit }' "${VERSIONS_FILE}" | tr -d '\r')
          echo "Current version: ${CURRENT_VERSION}"

          # If version ends in a number, increment it (e.g. alpha11 -> alpha12, beta1 -> beta2)
          # If not, append 1 (e.g. beta -> beta1, RC -> RC1)
          if [[ "${CURRENT_VERSION}" =~ ^(.*[^0-9])([0-9]+)$ ]]; then
            NEW_VERSION="${BASH_REMATCH[1]}$((BASH_REMATCH[2] + 1))"
          elif [[ -n "${CURRENT_VERSION}" ]]; then
            NEW_VERSION="${CURRENT_VERSION}1"
          else
            echo "Error: integrator.version is empty or invalid." >&2
            exit 1
          fi

          echo "New version: ${NEW_VERSION}"
          sed -i "s/^integrator\.version=.*/integrator.version=${NEW_VERSION}/" "${VERSIONS_FILE}"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create PR with version bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the workflow was triggered on a branch, not a tag or detached SHA
          if [[ "${{ github.ref_type }}" != "branch" ]]; then
            echo "Error: expected ref_type=branch, got '${{ github.ref_type }}' (${{ github.ref_name }}). Skipping version bump." >&2
            exit 1
          fi
          BASE_BRANCH="${{ github.ref_name }}"
          BRANCH="bump-integrator-version-${{ steps.bump.outputs.new_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -B resets the branch if it already exists (safe on reruns)
          git checkout -B "$BRANCH"
          git add ci/build/component-versions.properties
          git commit -m "Bump integrator version to ${{ steps.bump.outputs.new_version }}"
          # --force-with-lease is safe: only overwrites if no one else pushed to the branch
          git push --force-with-lease origin "$BRANCH"

          # Only open a new PR if one doesn't already exist for this branch
          if gh pr view "$BRANCH" --json number -q .number 2>/dev/null; then
            echo "PR already exists for branch $BRANCH, skipping creation."
          else
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$BRANCH" \
              --title "Bump integrator version to ${{ steps.bump.outputs.new_version }}" \
              --body "Automated version bump after successful release of \`v${{ needs.resolve-versions.outputs.integrator_version }}\`. Increments \`integrator.version\` to \`${{ steps.bump.outputs.new_version }}\` in \`ci/build/component-versions.properties\`."
          fi
